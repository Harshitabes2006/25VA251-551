<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>function in JS</h1>
    <script>
        function demo() {
            console.log("Hello Dawg");
        }
        demo(); // calling a function

        // with parameter
        function cal(a, b) {
            var num1 = a;
            var num2 = b;
            console.log("Addition of two Number is " + (num1 + num2));
        }
        cal(3, 5);

        // with default parameter
        function add(a, b = 5) {
            var num1 = a;
            var num2 = b;
            var result_1 = num1 + num2;
            console.log("Addition is " + result_1);
        }

        function mul(a, b = 8) {
            var num1 = a;
            var num2 = b;
            var result_2 = num1 * num2;
            console.log("multiplicaton is " + result_2);
        }

        function div(a, b = 9) {
            var num1 = a;
            var num2 = b;
            var result_3 = num1 / num2;
            console.log("division " + result_3);
        }

        add(10);
        mul(23);
        div(45);

        // Annoymus function
        let demo1 = function () {
            console.log("hello");
        }
        demo1();

        let demo2 = () => {
            console.log("hello Dost");
        }
        demo2();

        let demo3 = () => console.log("Autonomus");
        demo3();

        (function () {
            console.log("IIFE in JS");
        })();

        // callback
        function addRes(callback) {
            var num1 = 5;
            var num2 = 9;
            var res = num1 + num2;
            callback(res);
        }
        function result(res) {
            console.log("Addition of two numbers is  " + res);
        }
        addRes(result);
        //asynchronous function
        let myPromises = new Promise(function (resolve, reject) {
            let age = 35;
            if(age >= 18){
                resolve("valid age");
            }
            else{
                reject("wait for next year");
            }
        });
        myPromises
        .then(result => console.log (result))
        .catch(error => console.log(error))
        .finally(console.log("Done"));
        //async await
        async function userData(){
            try{
                let response = await fetch('https://dummyjson.com/products');
                let responseData = await response.json();
                console.log(responseData);
            }
            catch(error){
                console.log(error);
            }
        }
        userData();
        //higher order function
        //map
        let num=[3,4,5,6,7]
        let square=num.map(n=>n*2);
        console.log(square);
        //reduce
        let sum=num.reduce((total,n)=>total=n);
        console.log(sum);
        let sorting=num.filter(n=>n>3)
        console.log(sorting)
        //foreach
        num.forEach((n) => console.log(n * 2))
        // IIFE
       (function(){
        console.log("hellooooo");
       })();
    
        // short code for above code using arrow
        (msg=>console.log("Hello React"))();
        // local storage
        let userInfo={
            name : Harshit,
            age : 19,
            mob : 3412167589,
            Email : "harshit45665432678@gmail.com"

        };
        </script>
</body>

</html>
